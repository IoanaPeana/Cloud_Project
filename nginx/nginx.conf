events { worker_connections 1024; }

http {
    server_tokens off;

    upstream app_backend { server app:5000; }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass       http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
